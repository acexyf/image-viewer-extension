<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片查看器设置</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 data-i18n="popupTitle"></h1>
      <div class="status-container">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="statusText" data-i18n="statusLoading"></span>
      </div>

      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="toggleExtension" />
          <span class="slider"></span>
        </label>
        <span
          class="toggle-label"
          id="toggleLabel"
          data-i18n="toggleLabel"
        ></span>
      </div>

      <div class="instructions">
        <h3 data-i18n="instructions"></h3>
        <ul>
          <li data-i18n="instruction1"></li>
          <li data-i18n="instruction2"></li>
          <li data-i18n="instruction3"></li>
          <li data-i18n="instruction4"></li>
        </ul>
      </div>

      <div class="stats">
        <p><span data-i18n="imageCount"></span> <span id="imageCount">0</span></p>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
